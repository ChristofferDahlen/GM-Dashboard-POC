name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build GM app
        working-directory: peer-pathfinder/gm-app
        run: npm ci && npm run build

      - name: Build Player app
        working-directory: peer-pathfinder/player-app
        run: npm ci && npm run build

      - name: Add root index redirect
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=gm/"></head></html>' > docs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
